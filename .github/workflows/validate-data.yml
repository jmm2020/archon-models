name: validate-data

on:
  pull_request:
    paths:
      - "data/contrib/**"
      - "scripts/validate_examples.py"
  push:
    branches: [main]
    paths:
      - "data/contrib/**"
      - "scripts/validate_examples.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate contributed examples
        run: python scripts/validate_examples.py data/contrib
